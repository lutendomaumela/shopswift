name: ShopSwift CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB:       shopswift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations,venv \
            --ignore=E501,W503,E241,E221,E251,W292,E302,E303,F401,W291,W293,E261,E262,E272,E701,E225,E402,E128,F811,E711,E712
        # What we're ignoring and why:
        # E241 — multiple spaces after ','     (our aligned column style)
        # E221 — multiple spaces before '='    (our aligned column style)
        # E251 — spaces around keyword '='     (our aligned column style)
        # W292 — no newline at end of file     (editor formatting)
        # E302/E303 — blank line counts        (personal preference)
        # F401 — imported but unused           (we'll enforce this later)
        # W291/W293 — trailing whitespace      (editor formatting)
        # E261/E262 — inline comment spacing   (our comment style)

      - name: Create pytest.ini
        run: |
          echo "[pytest]" > pytest.ini
          echo "testpaths = tests" >> pytest.ini
          echo "pythonpath = ." >> pytest.ini

      - name: Run pytest
        env:
          DATABASE_URL:   postgresql://postgres:password@localhost:5432/shopswift_test
          JWT_SECRET_KEY: test-secret-key-for-ci
          SECRET_KEY:     test-flask-secret-for-ci
          FLASK_ENV:      testing
        run: |
          pytest tests/ -v --tb=short

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print image digest
        run: |
          echo "Image pushed successfully!"
          echo "Tags:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:${{ github.sha }}"