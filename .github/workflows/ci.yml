# .github/workflows/ci.yml
#
# This file IS your pipeline. GitHub reads it automatically.
# Every line has a purpose — nothing is boilerplate.

name: ShopSwift CI/CD   # Shows as the workflow name in GitHub's Actions tab

# ─── TRIGGERS ─────────────────────────────────────────────────────────────────
# When does this pipeline run?
on:
  push:
    branches: [main, develop]    # Run on every push to main or develop
  pull_request:
    branches: [main]              # Also run when someone opens a PR targeting main
# This means: every push gets tested. PRs can't be merged unless tests pass.

# ─── JOBS ─────────────────────────────────────────────────────────────────────
# A job is a group of steps that run on the same machine (runner).
# Jobs run in PARALLEL by default. We make "build" wait for "test" using needs:.

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: TEST
  # Runs your code against a real PostgreSQL database, checks code style.
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: Run tests
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu VM for this job

    # ── Services ──────────────────────────────────────────────────────────────
    # Services are Docker containers that run ALONGSIDE your job.
    # This is how we get a real PostgreSQL without docker-compose.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB:       shopswift_test   # Separate DB for tests
        ports:
          - 5432:5432    # Maps container port to runner's localhost
        options: >-      # Tell GitHub to wait until PostgreSQL is actually ready
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Steps ─────────────────────────────────────────────────────────────────
    # Steps run IN ORDER on the same machine. Each step is one action or command.
    steps:

      # Step 1: Get the code
      # actions/checkout is GitHub's official action to clone your repo.
      # Without this, the runner has an empty machine with no code.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      # This caches the Python installation so subsequent runs are faster.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # Cache pip downloads — rebuilds skip re-downloading packages

      # Step 3: Install your Python packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Lint — check code style
      # flake8 scans for syntax errors and style violations (unused imports, etc.)
      # --max-line-length 120: allow slightly longer lines than PEP8's 79 default
      # --exclude: ignore generated files and venv
      # If flake8 finds errors, this step fails and the pipeline stops here.
      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations,venv \
            --ignore=E501,W503

      # Step 5: Run tests
      # -v = verbose output (see each test name as it runs)
      # --tb=short = show shortened tracebacks on failure
      # The environment variables here match what conftest.py expects
      - name: Run pytest
        env:
          DATABASE_URL:   postgresql://postgres:password@localhost:5432/shopswift_test
          JWT_SECRET_KEY: test-secret-key-for-ci
          SECRET_KEY:     test-flask-secret-for-ci
          FLASK_ENV:      testing
        run: |
          pytest tests/ -v --tb=short

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: BUILD AND PUSH DOCKER IMAGE
  # Only runs if Job 1 (test) passes AND only on pushes to main.
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test   # ← This is the gate. If tests fail, this job never starts.

    # Only push an image when code lands on main, not on every PR.
    # We don't want a Docker image for every draft branch — only production-ready code.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      # Step 1: Get the code (same as above — each job starts fresh)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      # Uses the secrets you added in GitHub → Settings → Secrets.
      # ${{ secrets.DOCKERHUB_USERNAME }} reads the secret value — it's never visible in logs.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx
      # Buildx is Docker's extended build system.
      # It enables multi-platform builds and better layer caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and push the image
      # Two tags are applied to every image:
      #   latest              → always points to the newest passing build
      #   git-abc1234         → points to this exact commit forever (for rollbacks)
      #
      # cache-from/cache-to: GitHub caches Docker layers between runs.
      # If you only changed one Python file, the pip install layer is reused — much faster.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:${{ github.sha }}
          cache-from: type=gha        # Read cache from GitHub Actions cache
          cache-to:   type=gha,mode=max  # Write cache back for next run

      # Step 5: Print a summary so you can see the image details in the logs
      - name: Print image digest
        run: |
          echo "Image pushed successfully!"
          echo "Tags:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/shopswift:${{ github.sha }}"